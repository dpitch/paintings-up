<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paintings Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header">
    <div>
      <h1>Paintings Up</h1>
      <p class="subtitle" data-i18n="subtitle">Corriger l'éclairage inégal sur les photos de tableaux</p>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div id="drop-zone">
    <div class="quality-selector">
      <button class="quality-btn active" data-mode="web">
        <div class="quality-btn-title" data-i18n="qualityWeb">Web</div>
        <div class="quality-btn-desc" data-i18n="qualityWeb.desc">Image réduite, export WebP compressé</div>
      </button>
      <button class="quality-btn" data-mode="full">
        <div class="quality-btn-title" data-i18n="qualityFull">Pleine qualité</div>
        <div class="quality-btn-desc" data-i18n="qualityFull.desc">Dimensions originales, export PNG lossless</div>
      </button>
    </div>
    <svg class="icon" width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="6" width="36" height="36" rx="4"/>
      <circle cx="18" cy="18" r="3"/>
      <path d="M42 30l-10-10L8 42"/>
    </svg>
    <p data-i18n="dropText">Déposez une photo ici, ou cliquez pour parcourir</p>
  </div>
  <input type="file" id="file-input" accept="image/*">

  <div id="controls">
    <div class="control-bar">
      <div class="control-group">
        <label for="intensity" data-i18n="intensity">Intensité</label>
        <input type="range" id="intensity" min="0" max="100" value="85">
        <span id="intensity-value">85%</span>
      </div>

      <label class="toggle-label">
        <input type="checkbox" id="lightmap-toggle">
        <span data-i18n="showLightmap">Voir la lightmap</span>
      </label>

      <div class="control-group bg-control">
        <label for="bg-slider">BG</label>
        <input type="range" id="bg-slider" min="0" max="100" value="8">
      </div>

      <div class="control-group" style="margin-left:auto">
        <button class="primary" onclick="downloadCorrectedImage()" data-i18n="download">Télécharger corrigé</button>
      </div>
    </div>
  </div>

  <div id="workspace">
    <div id="comparison">
      <div id="before-clip"></div>
      <div id="after-clip"></div>
      <div id="comparison-slider"></div>
      <div class="slider-labels">
        <span data-i18n="before">Avant</span>
        <span data-i18n="after">Après</span>
      </div>
    </div>

    <div id="technique-panel"></div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-inner">
      <div class="loading-preview">
        <canvas id="loading-canvas"></canvas>
        <div class="scan-line"></div>
        <div class="scan-glow"></div>
      </div>
      <div class="loading-steps">
        <div class="loading-step" data-step="reading">
          <div class="step-dot"></div>
          <span data-i18n="stepReading">Lecture de l'image…</span>
        </div>
        <div class="loading-step" data-step="sampling">
          <div class="step-dot"></div>
          <span data-i18n="stepSampling">Analyse des bords du tableau…</span>
        </div>
        <div class="loading-step" data-step="lightmap">
          <div class="step-dot"></div>
          <span data-i18n="stepLightmap">Construction de la carte de lumière…</span>
        </div>
        <div class="loading-step" data-step="correcting">
          <div class="step-dot"></div>
          <span data-i18n="stepCorrecting">Correction de l'éclairage…</span>
        </div>
      </div>
    </div>
  </div>

  <p id="status"></p>

  <script src="lang.js"></script>
  <script src="correction.js"></script>
  <script src="lightmap.js"></script>

  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
